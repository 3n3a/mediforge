services:
  mediforge:
    build: .
    image: mediforge:latest
    container_name: mediforge
    env_file: .env
    volumes:
      - ${MEDIA_TV:?MEDIA_TV is required}:/media/tv
      - ${MEDIA_MOVIES:?MEDIA_MOVIES is required}:/media/movies
      - mediforge-db:/var/lib/mediforge
    environment:
      - MEDIA_LIBRARIES=tv:/media/tv,movies:/media/movies
      - MEDIFORGE_DB=/var/lib/mediforge/mediforge.db
    # No restart policy — mediforge is not a long-running watcher.
    # Run manually: docker compose run --rm mediforge dispatch
    # Or via cron on the host:
    #   0 */6 * * * docker compose -f /path/to/docker-compose.yml run --rm mediforge dispatch

volumes:
  mediforge-db:
