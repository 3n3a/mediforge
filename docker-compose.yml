services:
  mediforge:
    build: .
    image: mediforge:latest
    container_name: mediforge
    env_file: .env
    volumes:
      - ${MEDIA_TV:?MEDIA_TV is required}:/media/tv
      - ${MEDIA_MOVIES:?MEDIA_MOVIES is required}:/media/movies
      - mediforge-db:/var/lib/mediforge
    environment:
      - MEDIA_LIBRARIES=tv:/media/tv,movies:/media/movies
      - MEDIFORGE_DB=/var/lib/mediforge/mediforge.db
    # Long-running idle container. Nothing runs automatically on start.
    # Trigger work manually:
    #   docker compose up -d                                 # start (once)
    #   docker compose exec mediforge mediforge dispatch     # run on demand
    # Or via cron on the host:
    #   0 */6 * * * docker compose -f /path/to/docker-compose.yml exec -T mediforge mediforge dispatch >> /var/log/mediforge.log 2>&1
    restart: unless-stopped

volumes:
  mediforge-db:
